 <!-- NAVBAR -->
    <header id="navbar" class=" navbar bg-whit fixed top-0 left-0 right-0 z-[100] overflow-hidden  shadow-lg hover:shadow-xl transition-all duration-500 cursor-pointer transform  ">
        <nav class="max-w-7xl mx-auto flex items-center justify-between  px-6">
            
            <!-- Logo -->
            <div class="flex items-center" data-aos="fade-right">
                <a href="{% url 'home' %}" class="flex items-center space-x-3">
                    <img src="{% static 'img/ppl.png' %}" 
                         alt="Property Pioneers Logo"
                         class="h-20 w-auto transition-transform hover:scale-105">
                </a>
            </div>

            <!-- Desktop Links -->
            <ul class="hidden md:flex space-x-8 text-base font-medium" data-aos="fade-down">
                <li><a href="{% url 'home' %}" class="hover:text-primary-500 transition-colors duration-300 relative group">
                    Home
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-primary-500 group-hover:w-full transition-all duration-300"></span>
                </a></li>
                <li><a href="{% url 'about' %}" class="hover:text-primary-500 transition-colors duration-300 relative group">
                    About
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-primary-500 group-hover:w-full transition-all duration-300"></span>
                </a></li>
                <li><a href="{% url 'services' %}" class="hover:text-primary-500 transition-colors duration-300 relative group">
                    Services
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-primary-500 group-hover:w-full transition-all duration-300"></span>
                </a></li>
                <li><a href="{% url 'contact' %}" class="hover:text-primary-500 transition-colors duration-300 relative group">
                    Contact
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-primary-500 group-hover:w-full transition-all duration-300"></span>
                </a></li>
            </ul>

            <!-- CTA Button (Desktop) -->
            <div class="hidden md:flex space-x-2" data-aos="fade-left">
                <a href="{% url 'messages_dashboard' %}" class="bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2.5 px-6 rounded-lg transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    Get Started
                </a>
            </div>



            <!-- Mobile menu icon -->
            <button id="mobileMenuBtn" class="md:hidden text-primary-600 text-3xl focus:outline-none transition-transform hover:scale-110">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </nav>

        <!-- Mobile menu -->
        <div id="mobileMenu" class=" md:hidden border-t border-neutral-200 bg-transparent', 'bg-white/10', 'backdrop-blur-md  ">
            <ul class="flex flex-col px-8 py-4 space-y-4 text-base font-medium">
                <li><a href="{% url 'home' %}" class="block hover:text-primary-500 transition-colors py-2">Home</a></li>
                <li><a href="{% url 'about' %}" class="block hover:text-primary-500 transition-colors py-2">About</a></li>
                <li><a href="{% url 'services' %}" class="block hover:text-primary-500 transition-colors py-2">Services</a></li>
                <li><a href="{% url 'contact' %}" class="block hover:text-primary-500 transition-colors py-2">Contact</a></li>
                {% if user.is_authenticated and user.is_staff %}
                <li><a href="{% url 'admin_logout' %}" class="bloc hover:text-primary-500 transition-colors py-2 hidden">logout</a></li>
                {% endif %}
                 <!-- CTA Button -->
                <li class="pt-2">
                    <a href="{% url 'contact' %}" class="block text-center bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                        Get Started
                    </a>
                </li>
            </ul>
        </div>
    </header>
